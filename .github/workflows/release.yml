name: Release

# Pushing a version tag (e.g. v0.2.0) builds the Claude Desktop extension (.mcpb)
# and attaches it to a GitHub Release of the same name, which hosts the download.
on:
  push:
    tags: [ 'v*.*.*' ]

permissions:
  contents: write          # REQUIRED to create the release and upload the .mcpb asset.

jobs:
  release:
    runs-on: ubuntu-latest  # pwsh + node are preinstalled; win-x64 self-contained cross-compiles fine.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build .mcpb
        run: pwsh mcpb/build.ps1 -Version "$VERSION"

      - name: Create release and upload .mcpb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "$GITHUB_REF_NAME" dist/statuscake-mcp.mcpb
          --title "$GITHUB_REF_NAME" --generate-notes
          || gh release upload "$GITHUB_REF_NAME" dist/statuscake-mcp.mcpb --clobber
